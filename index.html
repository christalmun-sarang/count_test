<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사랑소아과 검사 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1a5f7a;
    --primary-light: #2980b9;
    --primary-dark: #0d3d52;
    --bg: #f0f4f8;
    --text-muted: #5d6d7e;
    --border: #d5e8f0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 60%, var(--primary-light) 100%);
    padding: 0 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    height: 56px;
    box-shadow: 0 3px 16px rgba(13,61,82,0.25);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-icon {
    width: 32px;
    height: 32px;
    background: rgba(255,255,255,0.18);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
  }

  header h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: 17px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.3px;
  }

  header .subtitle {
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    font-weight: 300;
    margin-left: auto;
  }

  /* ── Tab Nav ── */
  .tab-nav {
    background: #fff;
    border-bottom: 2px solid var(--border);
    padding: 0 32px;
    display: flex;
    gap: 4px;
    box-shadow: 0 1px 6px rgba(26,95,122,0.06);
  }

  .tab-btn {
    padding: 13px 28px;
    border: none;
    background: none;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    white-space: nowrap;
    position: relative;
    transition: color 0.2s;
  }

  .tab-btn::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0; right: 0;
    height: 3px;
    background: var(--primary);
    border-radius: 2px 2px 0 0;
    transform: scaleX(0);
    transition: transform 0.2s;
  }

  .tab-btn.active { color: var(--primary); font-weight: 700; }
  .tab-btn.active::after { transform: scaleX(1); }
  .tab-btn:hover { color: var(--primary); }

  /* ── Tab Content ── */
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  iframe {
    width: 100%;
    border: none;
    display: block;
  }
</style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <div class="header-icon">🏥</div>
  <h1>사랑소아과 검사 시스템</h1>
  <span class="subtitle">접수실</span>
</header>

<!-- ── TAB NAV ── -->
<nav class="tab-nav">
  <button class="tab-btn" onclick="switchTab('tab-messenger', this)">💬 메신저</button>
  <button class="tab-btn active" onclick="switchTab('tab-selsi', this)">🧒 SELSI 검사</button>
  <button class="tab-btn" onclick="switchTab('tab-kasq', this)">🌱 KASQ 검사</button>
</nav>

<!-- ══ MESSENGER ══ -->
<div id="tab-messenger" class="tab-content">
  <iframe id="messenger-frame" src="messenger.html" title="메신저" allow="microphone; camera"></iframe>
</div>

<!-- ══ SELSI ══ -->
<div id="tab-selsi" class="tab-content active">
  <iframe id="selsi-frame" src="selsi_count.html" title="SELSI 영·유아 언어발달 검사"></iframe>
</div>

<!-- ══ KASQ ══ -->
<div id="tab-kasq" class="tab-content">
  <iframe id="kasq-frame" src="kasq_admin.html" title="KASQ 영유아 발달 선별검사"></iframe>
</div>

<script>
  function setHeights() {
    const headerH = document.querySelector('header').offsetHeight;
    const navH    = document.querySelector('.tab-nav').offsetHeight;
    const h = window.innerHeight - headerH - navH;
    document.getElementById('selsi-frame').style.height = h + 'px';
    document.getElementById('kasq-frame').style.height  = h + 'px';
    document.getElementById('messenger-frame').style.height = h + 'px';
  }

  function switchTab(id, btn) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
  }

  window.addEventListener('load', setHeights);
  window.addEventListener('resize', setHeights);
</script>
</body>
</html>
